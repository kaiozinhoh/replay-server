version: '3.8'

services:
  replay-server-dev:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=development
      - PORT=3010
    env_file:
      - .env
    volumes:
      # Volume para desenvolvimento com hot reload
      - .:/app
      - /app/node_modules
      # Volumes para dados
      - ./temp:/app/temp
      - ./hls:/app/hls
      # Volumes para vídeos (desenvolvimento local)
      - ./dev-videos/shinobi:/home/Shinobi/videos
      - ./dev-videos/ftp:/home/ftp/videos
    command: npm run dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s